<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a1a">

  <!-- Open Graph for Social Sharing -->
  <meta property="og:title" content="머니디깅클럽 시뮬레이터">
  <meta property="og:description" content="당신이 출연자! AI 토크쇼 인터랙티브 게임">
  <meta property="og:type" content="game">
  <meta property="og:url" content="https://money-digging-simulator.vercel.app">
  <meta property="og:image" content="https://money-digging-simulator.vercel.app/og-image.png">

  <!-- Favicon as inline SVG (pixel art microphone) -->
  <link rel="icon" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'>
      <rect x='4' y='2' width='8' height='6' fill='%23FFD700'/>
      <rect x='6' y='8' width='4' height='2' fill='%23666'/>
      <rect x='5' y='10' width='6' height='1' fill='%23999'/>
      <rect x='4' y='11' width='8' height='1' fill='%23333'/>
    </svg>">

  <title>머니디깅클럽 시뮬레이터</title>

  <style>
/* ============================================
   머니디깅클럽 시뮬레이터 - 스타일시트
   CSS 클래스명은 js/ui.js와 정확히 매칭됨
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&display=swap');

/* ============================================
   CSS Variables
   ============================================ */
:root {
  --bg: #0a0a1a;
  --bg-card: #14142b;
  --gold: #FFD700;
  --gold-dark: #B8960F;
  --text: #e0e0e0;
  --text-dim: #888;
  --safe: #4CAF50;
  --bold: #FF9800;
  --funny: #E91E63;
  --pixel-font: 'Press Start 2P', monospace;
  --game-font: 'Noto Sans KR', sans-serif;
}

/* ============================================
   Reset & Base
   ============================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--game-font);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ============================================
   Game Container
   ============================================ */
#game-container {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #000;
}

#game-canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  width: 100%;
  max-height: 45vh;
  object-fit: contain;
  background: #1a1a2e;
}

#ui-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}
#ui-layer > * { pointer-events: auto; }

#overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  pointer-events: none;
}

/* ============================================
   Animations
   ============================================ */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes fadeOut { from{opacity:1} to{opacity:0} }
@keyframes slideUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes slideDown { from{transform:translateY(-30px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
@keyframes flash { 0%{opacity:1} 50%{opacity:0} 100%{opacity:1} }
@keyframes bounceIn { 0%{transform:scale(0.3);opacity:0} 50%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
@keyframes glowPulse { 0%,100%{text-shadow:0 0 10px rgba(255,215,0,0.5)} 50%{text-shadow:0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.3)} }

/* ============================================
   UI Screens (Title, Select, Result)
   ============================================ */
.ui-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.92);
  z-index: 50;
  animation: fadeIn 0.4s ease;
}

/* ---- Title Screen ---- */
.title-content {
  text-align: center;
  padding: 24px;
  max-width: 480px;
  width: 100%;
}
.game-title {
  font-family: var(--pixel-font);
  font-size: clamp(14px, 4vw, 22px);
  color: var(--gold);
  line-height: 1.8;
  animation: glowPulse 3s infinite;
  margin-bottom: 16px;
}
.game-subtitle {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 32px;
}
.title-graphic {
  font-size: 48px;
  margin-bottom: 32px;
  animation: float 3s ease-in-out infinite;
}
.button-start {
  display: inline-block;
  padding: 14px 48px;
  font-family: var(--pixel-font);
  font-size: 12px;
  color: #000;
  background: var(--gold);
  border: none;
  cursor: pointer;
  box-shadow: 0 0 0 3px #000, 0 0 0 5px var(--gold);
  transition: all 0.2s;
  animation: pulse 2s infinite;
}
.button-start:hover { transform: scale(1.08); box-shadow: 0 0 0 3px #000, 0 0 0 5px var(--gold), 0 0 20px rgba(255,215,0,0.5); }
.button-start:active { transform: scale(0.95); }
.game-info {
  margin-top: 24px;
  font-size: 11px;
  color: var(--text-dim);
}

/* ---- Character Select Screen ---- */
.select-content {
  text-align: center;
  padding: 20px;
  max-width: 500px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
}
.select-content h2 {
  font-family: var(--pixel-font);
  font-size: clamp(11px, 3vw, 16px);
  color: var(--gold);
  margin-bottom: 8px;
}
.select-subtitle {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 20px;
}
.character-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.character-card {
  background: var(--bg-card);
  padding: 18px 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  box-shadow: 0 0 0 2px #222, 0 0 0 4px #444;
}
.character-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 0 0 2px #000, 0 0 0 4px var(--gold);
}
.character-card:active { transform: scale(0.97); }
.char-emoji { font-size: 36px; margin-bottom: 8px; }
.char-name {
  font-family: var(--pixel-font);
  font-size: 10px;
  color: var(--gold);
  margin-bottom: 4px;
}
.char-role {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.char-desc {
  font-size: 12px;
  color: var(--text);
}

/* ---- Result Screen ---- */
.result-content {
  text-align: center;
  padding: 20px;
  max-width: 450px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
}
.result-title {
  font-family: var(--pixel-font);
  font-size: 14px;
  color: var(--gold);
  margin-bottom: 20px;
}
.result-card {
  background: var(--bg-card);
  padding: 24px 16px;
  box-shadow: 0 0 0 2px #000, 0 0 0 4px var(--gold);
  margin-bottom: 20px;
}
.result-grade {
  font-family: var(--pixel-font);
  font-size: clamp(20px, 6vw, 36px);
  color: var(--gold);
  margin-bottom: 12px;
  animation: bounceIn 0.6s ease;
}
.result-character { margin-bottom: 12px; }
.result-emoji { font-size: 40px; }
.result-name { font-size: 16px; font-weight: 700; margin-top: 4px; }
.result-data { text-align: left; }
.result-title-large {
  font-size: 18px;
  font-weight: 900;
  color: var(--gold);
  text-align: center;
  margin-bottom: 8px;
}
.result-rating, .result-viewers {
  text-align: center;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.result-personality {
  margin: 12px 0;
  padding: 10px;
  background: rgba(255,215,0,0.1);
  font-size: 13px;
  text-align: center;
}
.result-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin: 12px 0;
}
.stat-item {
  background: rgba(255,255,255,0.05);
  padding: 8px;
  text-align: center;
}
.stat-label { font-size: 11px; color: var(--text-dim); display: block; }
.stat-value { font-size: 16px; font-weight: 800; color: var(--gold); }
.result-comments {
  margin-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 12px;
}
.comment {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 6px;
  line-height: 1.5;
}
.button-restart {
  padding: 12px 36px;
  font-family: var(--pixel-font);
  font-size: 10px;
  color: var(--gold);
  background: transparent;
  border: 2px solid var(--gold);
  cursor: pointer;
  transition: all 0.2s;
}
.button-restart:hover { background: rgba(255,215,0,0.1); transform: scale(1.05); }

/* ============================================
   Dialogue Box
   ============================================ */
.dialogue-box {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10,10,26,0.95);
  border-top: 3px solid var(--gold);
  padding: 16px 20px 20px;
  min-height: 100px;
  z-index: 30;
  animation: slideUp 0.3s ease;
  cursor: pointer;
  box-shadow: 0 -4px 30px rgba(0,0,0,0.5);
}
.speaker-label {
  display: inline-block;
  padding: 4px 14px;
  font-family: var(--pixel-font);
  font-size: 9px;
  color: #000;
  font-weight: 700;
  margin-bottom: 10px;
  box-shadow: 0 0 0 2px #000;
}
.dialogue-text {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
  word-break: keep-all;
  min-height: 48px;
}
.dialogue-indicator {
  position: absolute;
  bottom: 8px;
  right: 16px;
  color: var(--gold);
  font-size: 14px;
  animation: blink 1s infinite;
}

/* ============================================
   Choice Buttons
   ============================================ */
.choices-container {
  position: fixed;
  bottom: 120px;
  left: 0;
  right: 0;
  padding: 0 12px 12px;
  z-index: 35;
}
.choices-content {
  max-width: 560px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.choices-content.slide-in {
  animation: slideUp 0.4s ease;
}
.choice-button {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 2px solid #333;
  color: var(--text);
  font-family: var(--game-font);
  font-size: 14px;
  line-height: 1.5;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  word-break: keep-all;
}
.choice-button:hover {
  border-color: var(--gold);
  background: rgba(255,215,0,0.08);
  transform: translateX(4px);
}
.choice-button:active { transform: scale(0.98); }
.choice-safe:hover { border-color: var(--safe); }
.choice-bold:hover { border-color: var(--bold); }
.choice-funny:hover { border-color: var(--funny); }
.mood-indicator { font-size: 16px; flex-shrink: 0; }
.choice-text { flex: 1; }

/* ============================================
   Progress Bar & Viewer Count (HUD)
   ============================================ */
.progress-container {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: rgba(255,255,255,0.1);
  z-index: 40;
}
.progress-bar {
  height: 100%;
  background: var(--gold);
  transition: width 0.5s ease;
  width: 0;
}
.viewer-count-container {
  position: fixed;
  top: 6px;
  right: 12px;
  z-index: 40;
}
.viewer-count {
  font-family: var(--pixel-font);
  font-size: 8px;
  color: var(--text-dim);
  background: rgba(0,0,0,0.6);
  padding: 4px 8px;
}

/* ============================================
   Scene Transition
   ============================================ */
.scene-transition {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 60;
  animation: fadeIn 0.3s ease;
  transition: opacity 0.6s ease;
}
.transition-content { text-align: center; animation: bounceIn 0.5s ease; }
.transition-frame {
  padding: 24px 40px;
  border: 2px solid var(--gold);
  box-shadow: 0 0 0 4px rgba(255,215,0,0.2);
}
.transition-part {
  font-family: var(--pixel-font);
  font-size: 10px;
  color: var(--gold);
  letter-spacing: 4px;
  margin-bottom: 8px;
}
.transition-title {
  font-size: 18px;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 6px;
}
.transition-section {
  font-size: 12px;
  color: var(--text-dim);
}

/* ============================================
   System Message
   ============================================ */
.system-message {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 20px;
  background: rgba(20,20,43,0.9);
  border: 1px solid #333;
  font-size: 13px;
  color: var(--text-dim);
  z-index: 45;
  animation: slideDown 0.3s ease;
  transition: opacity 0.3s ease;
  max-width: 90%;
  text-align: center;
  word-break: keep-all;
}
.system-message.event {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(255,215,0,0.1);
}

/* ============================================
   Event Overlay
   ============================================ */
.event-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 55;
  animation: fadeIn 0.3s ease;
  transition: opacity 0.3s ease;
}
.event-content {
  font-family: var(--pixel-font);
  font-size: clamp(11px, 3vw, 16px);
  color: var(--gold);
  text-align: center;
  padding: 20px;
  line-height: 2;
  animation: bounceIn 0.5s ease;
}
.event-shake { animation: shake 0.5s ease; }
.event-flash .event-content { animation: flash 0.3s ease 3; }

/* Confetti */
.confetti-piece {
  position: absolute;
  width: 8px;
  height: 8px;
  top: 0;
  animation: fall 2.5s linear forwards;
}

/* ============================================
   Responsive
   ============================================ */
@media (max-width: 480px) {
  .dialogue-box { padding: 12px 14px 16px; min-height: 80px; }
  .dialogue-text { font-size: 13px; }
  .choice-button { font-size: 13px; padding: 10px 12px; }
  .choices-container { bottom: 96px; }
  .character-grid { gap: 8px; }
  .character-card { padding: 14px 8px; }
  .char-emoji { font-size: 28px; }
}

@media (min-width: 768px) {
  #game-canvas { max-height: 55vh; }
  .dialogue-box { max-width: 700px; left: 50%; transform: translateX(-50%); border-radius: 0; }
  .choices-container { max-width: 700px; left: 50%; transform: translateX(-50%); }
}
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-layer"></div>
    <div id="overlay"></div>
  </div>

  <script>
(function() {
  // ============================================
  // SPRITES.JS - Pixel art sprite definitions
  // ============================================

  const PALETTES = {
    park: {
      '_': null, 'S': '#FFD5B8', 'H': '#4A3728', 'h': '#6B5240', 'G': '#E8F0FF', 'g': '#A8C8FF', 'T': '#4A4A4A', 't': '#6B6B6B', 'W': '#FFFFFF', 'B': '#2B5BA8', 'b': '#1E4080', 'e': '#000000',
    },
    shin: {
      '_': null, 'S': '#F5C8B8', 'D': '#2D1810', 'd': '#4A2818', 'P': '#E87BA8', 'p': '#D85B88', 'G': '#FFD700', 'W': '#FFFFFF', 'e': '#000000',
    },
    kim: {
      '_': null, 'S': '#F0C8B0', 'D': '#2D2015', 'd': '#4A3828', 'F': '#D4A574', 'f': '#A8844A', 'G': '#FFE8A8', 'O': '#C85A28', 'o': '#A84A18', 'W': '#FFFFFF', 'Y': '#D4B840', 'y': '#A88A20', 'e': '#000000',
    },
    bit: {
      '_': null, 'S': '#F5D8C8', 'P': '#7B3FA8', 'p': '#5A2B80', 'H': '#3A3A3A', 'Y': '#FFD700', 'y': '#E8C000', 'e': '#000000',
    },
  };

  const SPRITES = {
    park: { idle: [['________________','__hhhhhhhhhh____','_hH_HhHhHh_Hh___','_hHG_GG_GhHhH___','_hHGG_GGGhH_H___','_hHG_GGGGH_HhH__','_hHh_GGG_h_HhH__','__hhhhhhhhhH____','________WW_W____','________WW_W____','____TTWTTWW_W___','___TTWTTTWW_W___','___TTWTTTWbeW___','___TTWTTTW_W____','___TTWTTTB_B____','____TTWTBBB_____','____TT_bB_b_____','_____TT__T______','_____TT_bTb_____','_____TT__TT_____','________________','________________',],[]], talk: [[[]], []], react: [[[]]] },
    shin: { idle: [[[]], []], talk: [[[]], []], react: [[[]]] },
    kim: { idle: [[[]], []], talk: [[[]], []], react: [[[]]] },
    bit: { idle: [[[]], []], talk: [[[]], []], react: [[[]]] },
  };

  const FURNITURE = {
    table: { palette: { '_': null, 'T': '#8B4513', 't': '#654321', 'E': '#A0522D', }, rows: [] },
    microphone: { palette: { '_': null, 'M': '#505050', 'm': '#303030', 'B': '#2A2A2A', 'G': '#FFD700', }, rows: [] },
    onAirSign: { palette: { '_': null, 'R': '#FF2020', 'r': '#CC1010', 'B': '#000000', 'G': '#FF6060', }, rows: [] },
  };

  function getSprite(charId, state, frame = 0) {
    if (!SPRITES[charId]) throw new Error(`Unknown character: ${charId}`);
    if (!SPRITES[charId][state]) throw new Error(`Unknown state: ${state}`);
    const spriteData = SPRITES[charId][state];
    const frameIndex = frame % spriteData.length;
    const rows = spriteData[frameIndex];
    return { palette: PALETTES[charId], rows: rows };
  }

  function getFurniture(furnitureId) {
    if (!FURNITURE[furnitureId]) throw new Error(`Unknown furniture: ${furnitureId}`);
    return FURNITURE[furnitureId];
  }

  const CHARACTER_IDS = ['park', 'shin', 'kim', 'bit'];
  const CHARACTER_INFO = {
    park: { name: '박정호', title: 'MC' },
    shin: { name: '신혜원', title: 'MC' },
    kim: { name: '김덕진', title: 'AI전문가' },
    bit: { name: '비트PD', title: 'YouTuber' },
  };

  // ============================================
  // RENDERER.JS - Canvas renderer
  // ============================================

  const NATIVE_WIDTH = 240;
  const NATIVE_HEIGHT = 160;
  const CHARACTER_POSITIONS = {
    park: { x: 40, y: 50, anchorX: 8, anchorY: 11 },
    shin: { x: 180, y: 50, anchorX: 8, anchorY: 11 },
    kim: { x: 40, y: 100, anchorX: 8, anchorY: 11 },
    bit: { x: 180, y: 100, anchorX: 8, anchorY: 11 },
  };

  class Renderer {
    constructor(displayCanvas) {
      this.displayCanvas = displayCanvas;
      this.displayCtx = displayCanvas.getContext('2d');
      this.canvas = document.createElement('canvas');
      this.canvas.width = NATIVE_WIDTH;
      this.canvas.height = NATIVE_HEIGHT;
      this.ctx = this.canvas.getContext('2d');
      this.frameCount = 0;
      this.animationFrameId = null;
      this.running = false;
      this.characterStates = {
        park: { state: 'idle', frame: 0 },
        shin: { state: 'idle', frame: 0 },
        kim: { state: 'idle', frame: 0 },
        bit: { state: 'idle', frame: 0 },
      };
      this.activeSpeaker = null;
      this.playerCharacter = null;
      this.floatingEmojis = [];
      this.onAirPulse = 0;
      this.particles = this.generateParticles();
    }

    init() {
      this.displayCtx.imageSmoothingEnabled = false;
      this.displayCtx.webkitImageSmoothingEnabled = false;
      this.displayCtx.msImageSmoothingEnabled = false;
      this.scaleToWindow();
      window.addEventListener('resize', () => this.scaleToWindow());
    }

    scaleToWindow() {
      const aspectRatio = NATIVE_WIDTH / NATIVE_HEIGHT;
      let width = window.innerWidth * 0.9;
      let height = window.innerHeight * 0.9;
      if (width / height > aspectRatio) width = height * aspectRatio;
      else height = width / aspectRatio;
      this.displayCanvas.width = width;
      this.displayCanvas.height = height;
    }

    setActiveSpeaker(charId) { this.activeSpeaker = charId; }
    setCharacterState(charId, state) {
      if (this.characterStates[charId]) {
        this.characterStates[charId].state = state;
        this.characterStates[charId].frame = 0;
      }
    }
    setPlayerCharacter(charId) { this.playerCharacter = charId; }
    showEmoji(charId, emoji) {
      const pos = CHARACTER_POSITIONS[charId];
      if (pos) {
        this.floatingEmojis.push({ emoji, x: pos.x, y: pos.y - 20, life: 60, maxLife: 60 });
      }
    }

    generateParticles() {
      const particles = [];
      for (let i = 0; i < 12; i++) {
        particles.push({
          x: Math.random() * NATIVE_WIDTH,
          y: Math.random() * NATIVE_HEIGHT,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          life: Math.random() * 100 + 50,
          maxLife: 100,
        });
      }
      return particles;
    }

    updateParticles() {
      for (let p of this.particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) {
          p.x = Math.random() * NATIVE_WIDTH;
          p.y = Math.random() * NATIVE_HEIGHT;
          p.life = 100;
        }
        if (p.x < 0 || p.x > NATIVE_WIDTH) p.vx *= -1;
        if (p.y < 0 || p.y > NATIVE_HEIGHT) p.vy *= -1;
      }
    }

    render() {
      this.frameCount++;
      this.ctx.fillStyle = '#1a1a2e';
      this.ctx.fillRect(0, 0, NATIVE_WIDTH, NATIVE_HEIGHT);
      this.drawStudioBackground();
      this.updateParticles();
      this.drawParticles();
      this.updateEmojis();
      this.drawEmojis();
      this.scaleToDisplay();
    }

    drawStudioBackground() {
      const gradient = this.ctx.createLinearGradient(0, 0, 0, NATIVE_HEIGHT);
      gradient.addColorStop(0, '#16213e');
      gradient.addColorStop(1, '#0f3460');
      this.ctx.fillStyle = gradient;
      this.ctx.fillRect(0, 0, NATIVE_WIDTH, NATIVE_HEIGHT);
      this.ctx.strokeStyle = '#1a3a4a';
      this.ctx.lineWidth = 0.5;
      for (let i = 0; i <= NATIVE_HEIGHT; i += 16) {
        this.ctx.beginPath();
        this.ctx.moveTo(0, i);
        this.ctx.lineTo(NATIVE_WIDTH, i);
        this.ctx.stroke();
      }
      for (let i = 0; i <= NATIVE_WIDTH; i += 16) {
        this.ctx.beginPath();
        this.ctx.moveTo(i, 0);
        this.ctx.lineTo(i, NATIVE_HEIGHT);
        this.ctx.stroke();
      }
      this.drawLighting();
    }

    drawLighting() {
      const gradL = this.ctx.createRadialGradient(20, 60, 0, 20, 60, 50);
      gradL.addColorStop(0, 'rgba(255, 100, 50, 0.1)');
      gradL.addColorStop(1, 'rgba(255, 100, 50, 0)');
      this.ctx.fillStyle = gradL;
      this.ctx.fillRect(0, 30, 80, 100);
      const gradR = this.ctx.createRadialGradient(NATIVE_WIDTH - 20, 60, 0, NATIVE_WIDTH - 20, 60, 50);
      gradR.addColorStop(0, 'rgba(100, 150, 255, 0.1)');
      gradR.addColorStop(1, 'rgba(100, 150, 255, 0)');
      this.ctx.fillStyle = gradR;
      this.ctx.fillRect(NATIVE_WIDTH - 80, 30, 80, 100);
    }

    drawParticles() {
      this.ctx.fillStyle = 'rgba(200, 200, 220, 0.4)';
      for (let p of this.particles) {
        const alpha = (p.life / p.maxLife) * 0.3;
        this.ctx.fillStyle = `rgba(200, 200, 220, ${alpha})`;
        this.ctx.fillRect(p.x, p.y, 1, 1);
      }
    }

    updateEmojis() {
      this.floatingEmojis = this.floatingEmojis.filter((e) => {
        e.y -= 0.5;
        e.life--;
        return e.life > 0;
      });
    }

    drawEmojis() {
      for (let emoji of this.floatingEmojis) {
        const alpha = emoji.life / emoji.maxLife;
        this.ctx.globalAlpha = alpha;
        this.ctx.font = '14px Arial';
        this.ctx.textAlign = 'center';
        this.ctx.textBaseline = 'middle';
        this.ctx.fillText(emoji.emoji, emoji.x, emoji.y);
        this.ctx.globalAlpha = 1;
      }
    }

    drawSpriteData(rows, palette, x, y) {
      const spriteWidth = rows[0].length;
      const spriteHeight = rows.length;
      for (let row = 0; row < spriteHeight; row++) {
        for (let col = 0; col < spriteWidth; col++) {
          const char = rows[row][col];
          const color = palette[char];
          if (color !== null && color !== undefined) {
            this.ctx.fillStyle = color;
            this.ctx.fillRect(x + col, y + row, 1, 1);
          }
        }
      }
    }

    scaleToDisplay() {
      this.displayCtx.fillStyle = '#000000';
      this.displayCtx.fillRect(0, 0, this.displayCanvas.width, this.displayCanvas.height);
      this.displayCtx.drawImage(this.canvas, 0, 0, NATIVE_WIDTH, NATIVE_HEIGHT, 0, 0, this.displayCanvas.width, this.displayCanvas.height);
    }

    start() {
      if (this.running) return;
      this.running = true;
      const animate = () => {
        this.render();
        this.animationFrameId = requestAnimationFrame(animate);
      };
      animate();
    }

    stop() {
      this.running = false;
      if (this.animationFrameId) {
        cancelAnimationFrame(this.animationFrameId);
        this.animationFrameId = null;
      }
    }
  }

  // AUDIO.JS - Web Audio API sound effects

  class Audio {
    constructor() {
      this.ctx = null;
      this.enabled = true;
      this.masterGain = null;
    }

    init() {
      if (this.ctx) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AudioContext();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0.3;
      this.masterGain.connect(this.ctx.destination);
    }

    playType() {
      if (!this.enabled || !this.ctx) return;
      const now = this.ctx.currentTime;
      const duration = 0.05;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(400, now + duration);
      osc.connect(gain);
      gain.connect(this.masterGain);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
      osc.start(now);
      osc.stop(now + duration);
    }

    playSelect() {
      if (!this.enabled || !this.ctx) return;
      const now = this.ctx.currentTime;
      const duration = 0.1;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.linearRampToValueAtTime(600, now + duration);
      osc.connect(gain);
      gain.connect(this.masterGain);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
      osc.start(now);
      osc.stop(now + duration);
    }

    playConfirm() {
      if (!this.enabled || !this.ctx) return;
      const now = this.ctx.currentTime;
      this.playTone(500, 0.08, now);
      this.playTone(700, 0.08, now + 0.1);
    }

    playTone(freq, duration, time) {
      if (!this.ctx) return;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      osc.connect(gain);
      gain.connect(this.masterGain);
      gain.gain.setValueAtTime(0.25, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
      osc.start(time);
      osc.stop(time + duration);
    }

    playReact() {
      if (!this.enabled || !this.ctx) return;
      const now = this.ctx.currentTime;
      const duration = 0.15;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.linearRampToValueAtTime(800, now + duration * 0.5);
      osc.frequency.linearRampToValueAtTime(400, now + duration);
      osc.connect(gain);
      gain.connect(this.masterGain);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
      osc.start(now);
      osc.stop(now + duration);
    }

    toggle() { this.enabled = !this.enabled; }
    setVolume(value) {
      if (this.masterGain) this.masterGain.gain.value = Math.max(0, Math.min(1, value));
    }
  }

  class UI {
    constructor(container) {
      this.container = container;
      this.dialogueBox = null;
      this.choicesContainer = null;
      this.currentDialogue = null;
      this.isTyping = false;
    }

    showTitle(onStart) {
      this.clearAll();
      const titleScreen = document.createElement('div');
      titleScreen.className = 'ui-screen title-screen';
      titleScreen.innerHTML = `
        <div class="title-content">
          <h1 class="game-title">머니디깅클럽 시뮬레이터</h1>
          <p class="game-subtitle">AI와 돈의 시대, 당신은 어떤 출연자?</p>
          <div class="title-graphic"><div class="pixel-mic">🎤</div></div>
          <button class="button-start" data-action="start">시작하기</button>
          <p class="game-info">🔊 음성 OFF | 채널: 머니인사이드</p>
        </div>
      `;
      this.container.appendChild(titleScreen);
      titleScreen.querySelector('.button-start').addEventListener('click', () => {
        titleScreen.remove();
        onStart();
      });
    }

    showCharacterSelect(characters, onSelect) {
      this.clearAll();
      const selectScreen = document.createElement('div');
      selectScreen.className = 'ui-screen select-screen';
      let html = `<div class="select-content"><h2>출연자를 선택하세요</h2><p class="select-subtitle">당신은 누가 되어 토크쇼에 참여하시겠어요?</p><div class="character-grid">`;
      Object.values(characters).forEach((char) => {
        html += `<div class="character-card" data-id="${char.id}"><div class="char-emoji">${char.emoji}</div><h3 class="char-name">${char.name}</h3><p class="char-role">${char.role}</p><p class="char-desc">${char.description}</p></div>`;
      });
      html += `</div></div>`;
      selectScreen.innerHTML = html;
      this.container.appendChild(selectScreen);
      selectScreen.querySelectorAll('.character-card').forEach((card) => {
        card.addEventListener('click', () => {
          const charId = card.dataset.id;
          selectScreen.remove();
          onSelect(charId);
        });
      });
    }

    async showDialogueBox(name, text, color, onComplete) {
      if (this.isTyping) {
        await new Promise((resolve) => {
          const checkInterval = setInterval(() => {
            if (!this.isTyping) { clearInterval(checkInterval); resolve(); }
          }, 50);
        });
      }
      if (this.dialogueBox) this.dialogueBox.remove();
      this.dialogueBox = document.createElement('div');
      this.dialogueBox.className = 'dialogue-box';
      const speakerLabel = document.createElement('div');
      speakerLabel.className = 'speaker-label';
      speakerLabel.style.backgroundColor = color;
      speakerLabel.textContent = name;
      const textContent = document.createElement('div');
      textContent.className = 'dialogue-text';
      textContent.setAttribute('data-text', text);
      const indicator = document.createElement('div');
      indicator.className = 'dialogue-indicator';
      indicator.innerHTML = '▼';
      this.dialogueBox.appendChild(speakerLabel);
      this.dialogueBox.appendChild(textContent);
      this.dialogueBox.appendChild(indicator);
      this.container.appendChild(this.dialogueBox);
      await this.typewriterEffect(textContent, text, 40);
      return new Promise((resolve) => {
        const clickHandler = () => {
          this.dialogueBox.removeEventListener('click', clickHandler);
          onComplete();
          resolve();
        };
        this.dialogueBox.addEventListener('click', clickHandler);
      });
    }

    showChoices(options, onChoose) {
      if (this.choicesContainer) this.choicesContainer.remove();
      this.choicesContainer = document.createElement('div');
      this.choicesContainer.className = 'choices-container';
      const choicesContent = document.createElement('div');
      choicesContent.className = 'choices-content';
      options.forEach((option, index) => {
        const button = document.createElement('button');
        button.className = `choice-button choice-${option.mood}`;
        const moodEmoji = { safe: '🟢', bold: '🟠', funny: '🔴' }[option.mood];
        button.innerHTML = `<span class="mood-indicator">${moodEmoji}</span><span class="choice-text">${option.text}</span>`;
        button.addEventListener('click', () => {
          this.choicesContainer.remove();
          this.choicesContainer = null;
          onChoose(index);
        });
        choicesContent.appendChild(button);
      });
      this.choicesContainer.appendChild(choicesContent);
      this.container.appendChild(this.choicesContainer);
      choicesContent.classList.add('slide-in');
    }

    hideDialogue() {
      if (this.dialogueBox) {
        this.dialogueBox.style.opacity = '0';
        this.dialogueBox.style.pointerEvents = 'none';
      }
      if (this.choicesContainer) {
        this.choicesContainer.style.opacity = '0';
        this.choicesContainer.style.pointerEvents = 'none';
      }
    }

    async showSystemMessage(text, isEvent = false) {
      const message = document.createElement('div');
      message.className = isEvent ? 'system-message event' : 'system-message';
      message.textContent = text;
      this.container.appendChild(message);
      return new Promise((resolve) => {
        setTimeout(() => {
          message.style.opacity = '0';
          setTimeout(() => {
            message.remove();
            resolve();
          }, 300);
        }, 1500);
      });
    }

    async showSceneTransition(part, title, section) {
      const transition = document.createElement('div');
      transition.className = 'scene-transition';
      const content = document.createElement('div');
      content.className = 'transition-content';
      content.innerHTML = `<div class="transition-frame"><div class="transition-part">${part}</div><div class="transition-title">${title}</div><div class="transition-section">${section}</div></div>`;
      transition.appendChild(content);
      this.container.appendChild(transition);
      return new Promise((resolve) => {
        setTimeout(() => {
          transition.style.opacity = '0';
          setTimeout(() => {
            transition.remove();
            resolve();
          }, 600);
        }, 2000);
      });
    }

    updateProgress(percent) {
      let progressBar = document.getElementById('progress-bar');
      if (!progressBar) {
        const container = document.createElement('div');
        container.className = 'progress-container';
        container.innerHTML = '<div id="progress-bar" class="progress-bar"></div>';
        this.container.appendChild(container);
        progressBar = document.getElementById('progress-bar');
      }
      progressBar.style.width = percent + '%';
    }

    updateViewerCount(count) {
      let viewerDisplay = document.getElementById('viewer-count');
      if (!viewerDisplay) {
        const container = document.createElement('div');
        container.className = 'viewer-count-container';
        container.innerHTML = '<div id="viewer-count" class="viewer-count">👥 0</div>';
        this.container.appendChild(container);
        viewerDisplay = document.getElementById('viewer-count');
      }
      viewerDisplay.textContent = `👥 ${count.toLocaleString('ko-KR')}`;
    }

    async showEventOverlay(text, effect) {
      const overlay = document.createElement('div');
      overlay.className = `event-overlay event-${effect}`;
      const content = document.createElement('div');
      content.className = 'event-content';
      content.textContent = text;
      overlay.appendChild(content);
      this.container.appendChild(overlay);
      if (effect === 'shake') overlay.classList.add('shake-animation');
      else if (effect === 'flash') overlay.classList.add('flash-animation');
      else if (effect === 'confetti') this.createConfetti(overlay);
      return new Promise((resolve) => {
        setTimeout(() => {
          overlay.style.opacity = '0';
          setTimeout(() => {
            overlay.remove();
            resolve();
          }, 300);
        }, 1500);
      });
    }

    showResult(resultData, onRestart) {
      this.clearAll();
      const resultScreen = document.createElement('div');
      resultScreen.className = 'ui-screen result-screen';
      const gradeEmoji = { S: '⭐', A: '🌟', B: '✨', C: '🌠' }[resultData.grade];
      let html = `<div class="result-content"><h2 class="result-title">방송 종료!</h2><div class="result-card"><div class="result-grade">${gradeEmoji} ${resultData.grade}등급</div><div class="result-character"><div class="result-emoji">${resultData.character.emoji}</div><div class="result-name">${resultData.character.name}</div></div><div class="result-data"><div class="result-title-large">${resultData.title}</div><div class="result-rating">시청률: ${resultData.rating}</div><div class="result-viewers">최종 시청자: ${resultData.finalViewerCount.toLocaleString('ko-KR')}명</div><div class="result-personality"><strong>당신의 성격:</strong> ${resultData.personality}</div><div class="result-stats"><div class="stat-item"><span class="stat-label">안전함 🟢</span><span class="stat-value">${resultData.choices.safe}회</span></div><div class="stat-item"><span class="stat-label">대담함 🟠</span><span class="stat-value">${resultData.choices.bold}회</span></div><div class="stat-item"><span class="stat-label">재미있음 🔴</span><span class="stat-value">${resultData.choices.funny}회</span></div></div><div class="result-comments">`;
      resultData.comments.forEach((comment) => { html += `<p class="comment">💬 ${comment}</p>`; });
      html += `</div></div></div><button class="button-restart">다시 시작</button></div>`;
      resultScreen.innerHTML = html;
      this.container.appendChild(resultScreen);
      resultScreen.querySelector('.button-restart').addEventListener('click', () => {
        resultScreen.remove();
        onRestart();
      });
    }

    async typewriterEffect(element, text, speed = 40) {
      this.isTyping = true;
      element.textContent = '';
      for (let i = 0; i < text.length; i++) {
        element.textContent += text[i];
        await this.delay(speed);
      }
      this.isTyping = false;
    }

    clearAll() {
      this.container.innerHTML = '';
      this.dialogueBox = null;
      this.choicesContainer = null;
      this.currentDialogue = null;
      this.isTyping = false;
    }

    createConfetti(container) {
      const colors = ['#FFD700', '#FF6B6B', '#4FC3F7', '#F48FB1', '#FF8A65'];
      for (let i = 0; i < 30; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti-piece';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animation = `fall ${2 + Math.random() * 1}s linear`;
        container.appendChild(confetti);
      }
    }

    delay(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
  }

  class Game {
    constructor(renderer, ui, audio) {
      this.renderer = renderer;
      this.ui = ui;
      this.audio = audio;
      this.state = {
        screen: 'title',
        selectedChar: null,
        currentStep: 0,
        score: 0,
        choices: { safe: 0, bold: 0, funny: 0 },
        viewerCount: 12847,
        maxViewerCount: 47293,
        isAnimating: false,
        choiceCount: 0,
        totalChoices: 0
      };
      this.lastChoiceMood = null;
    }

    showTitle() {
      this.state.screen = 'title';
      this.ui.showTitle(() => this.start());
    }

    start() {
      this.state.screen = 'select';
      this.ui.showCharacterSelect(CHARACTERS, (charId) => this.selectCharacter(charId));
    }

    selectCharacter(charId) {
      this.state.selectedChar = charId;
      this.state.screen = 'playing';
      this.state.currentStep = 0;
      this.renderer.setPlayerCharacter(charId);
      this.ui.updateProgress(0);
      this.ui.updateViewerCount(this.state.viewerCount);
      this.processStep();
    }

    async processStep() {
      if (this.state.isAnimating) return;
      if (this.state.currentStep >= SCENES.length) return this.showResult();
      const step = SCENES[this.state.currentStep];
      switch (step.type) {
        case 'scene_change':
          await this.ui.showSceneTransition(step.part, step.title, step.section);
          this.updateProgress();
          break;
        case 'dialogue':
          await this.handleDialogue(step);
          break;
        case 'system':
          await this.ui.showSystemMessage(step.text, false);
          break;
        case 'event':
          await this.handleEvent(step);
          break;
        case 'choice':
          await this.handleChoice(step);
          return;
        case 'reaction':
          await this.handleReaction(step);
          break;
      }
      this.state.currentStep++;
      await this.delay(400);
      this.processStep();
    }

    async handleDialogue(step) {
      const char = CHARACTERS[step.speaker] || CHARACTERS.park;
      this.renderer.setActiveSpeaker(step.speaker);
      this.renderer.setCharacterState(step.speaker, 'talk');
      const isPlayer = step.speaker === this.state.selectedChar;
      const boxColor = isPlayer ? '#FFEB3B' : char.color;
      const name = step.speaker === 'all' ? '모두' : char.name;
      await this.ui.showDialogueBox(name, step.text, boxColor, () => {});
      this.renderer.setCharacterState(step.speaker, 'idle');
      this.renderer.setActiveSpeaker(null);
    }

    async handleEvent(step) {
      await this.ui.showEventOverlay(step.text, step.effect);
      if (step.text.includes('테마곡')) this.state.viewerCount = 12847;
      else if (step.text.includes('AI 음성')) this.state.viewerCount += 5000;
      else if (step.text.includes('투표')) this.state.viewerCount += 8000;
      else if (step.text.includes('크레딧')) this.state.viewerCount = 47293;
      this.ui.updateViewerCount(this.state.viewerCount);
    }

    async handleChoice(step) {
      this.state.isAnimating = true;
      const isPlayerTurn = step.forCharacters.includes(this.state.selectedChar);
      if (isPlayerTurn) {
        return new Promise((resolve) => {
          this.ui.showChoices(step.options, async (optionIndex) => {
            await this.makeChoice(optionIndex, step.options[optionIndex]);
            this.state.isAnimating = false;
            resolve();
            setTimeout(() => this.processStep(), 500);
          });
        });
      } else {
        await this.autoAnswer(step);
        this.state.currentStep++;
        this.state.isAnimating = false;
        await this.delay(500);
        this.processStep();
      }
    }

    async makeChoice(optionIndex, option) {
      const mood = option.mood;
      const score = option.score;
      this.state.score += score;
      this.state.choices[mood]++;
      this.state.choiceCount++;
      this.lastChoiceMood = mood;
      const viewerIncrease = score === 3 ? 2000 : score === 2 ? 1000 : 500;
      this.state.viewerCount += viewerIncrease;
      this.state.viewerCount = Math.min(this.state.viewerCount, this.state.maxViewerCount);
      this.ui.hideDialogue();
      await this.delay(200);
      this.ui.updateViewerCount(this.state.viewerCount);
      this.updateProgress();
    }

    async handleReaction(step) {
      if (!step.reactions) return;
      const moodKey = this.lastChoiceMood || 'safe';
      for (const [charId, texts] of Object.entries(step.reactions)) {
        if (charId === this.state.selectedChar) continue;
        if (!CHARACTERS[charId]) continue;
        const idx = moodKey === 'bold' ? 1 : moodKey === 'funny' ? 2 : 0;
        const text = texts[Math.min(idx, texts.length - 1)];
        this.renderer.setActiveSpeaker(charId);
        this.renderer.setCharacterState(charId, 'react');
        await this.ui.showDialogueBox(CHARACTERS[charId].name, text, CHARACTERS[charId].color, () => {});
        this.renderer.setCharacterState(charId, 'idle');
        this.renderer.setActiveSpeaker(null);
        break;
      }
      this.lastChoiceMood = null;
    }

    async autoAnswer(step) {
      const otherChars = step.forCharacters.filter((id) => id !== this.state.selectedChar);
      const selectedChar = otherChars[Math.floor(Math.random() * otherChars.length)];
      const randomOption = step.options[Math.floor(Math.random() * step.options.length)];
      const char = CHARACTERS[selectedChar];
      await this.ui.showDialogueBox(char.name, randomOption.text, char.color, () => {});
      this.state.score += randomOption.score;
      this.state.choices[randomOption.mood]++;
    }

    updateProgress() {
      const progress = (this.state.currentStep / SCENES.length) * 100;
      this.ui.updateProgress(progress);
    }

    getResult() {
      let grade = 'C';
      if (this.state.score >= GRADE_THRESHOLD.S) grade = 'S';
      else if (this.state.score >= GRADE_THRESHOLD.A) grade = 'A';
      else if (this.state.score >= GRADE_THRESHOLD.B) grade = 'B';
      const gradeData = RESULT_GRADES[grade];
      const selectedChar = CHARACTERS[this.state.selectedChar];
      return {
        grade,
        character: selectedChar,
        title: gradeData.title,
        rating: gradeData.rating,
        personality: gradeData.personality,
        comments: gradeData.comments,
        score: this.state.score,
        choices: this.state.choices,
        finalViewerCount: this.state.viewerCount
      };
    }

    async showResult() {
      this.state.screen = 'result';
      const resultData = this.getResult();
      this.ui.showResult(resultData, () => this.restart());
    }

    restart() {
      this.state = {
        screen: 'title',
        selectedChar: null,
        currentStep: 0,
        score: 0,
        choices: { safe: 0, bold: 0, funny: 0 },
        viewerCount: 12847,
        maxViewerCount: 47293,
        isAnimating: false,
        choiceCount: 0,
        totalChoices: 0
      };
      this.lastChoiceMood = null;
      this.ui.hideDialogue();
      this.renderer.setPlayerCharacter(null);
      this.renderer.setActiveSpeaker(null);
      this.showTitle();
    }

    delay(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
  }

  // ============================================
  // MAIN.JS - Application entry point
  // ============================================

  class App {
    constructor() {
      this.canvas = document.getElementById('game-canvas');
      this.uiLayer = document.getElementById('ui-layer');
      this.renderer = new Renderer(this.canvas);
      this.ui = new UI(this.uiLayer);
      this.audio = new Audio();
      this.game = new Game(this.renderer, this.ui, this.audio);
      this.audioInitialized = false;
    }

    init() {
      const initAudioOnce = () => {
        if (!this.audioInitialized) {
          this.audio.init();
          this.audioInitialized = true;
        }
      };
      document.addEventListener('click', initAudioOnce, { once: true });
      document.addEventListener('touchstart', initAudioOnce, { once: true });
      this.renderer.init();
      this.renderer.start();
      this.game.showTitle();
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    const app = new App();
    app.init();
    window.__app = app;
  });
})();
  </script>
</body>
